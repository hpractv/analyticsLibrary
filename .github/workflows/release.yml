name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to release (e.g. 2.0.0)'
        required: true
        default: '2.0.0'

jobs:
  release:
    name: Build, Test, Pack, Deploy, and Deprecate
    runs-on: ubuntu-latest
    environment: nuget-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Compute release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal --filter "Category!=Integration"

      - name: Validate release version against project versions
        run: |
          V="${{ steps.version.outputs.VERSION }}"
          if ! [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Release version must be SemVer major.minor.patch (got '$V')."
            exit 1
          fi

          PROJECTS=(
            src/analyticsLibrary.Core/analyticsLibrary.Core.csproj
            src/analyticsLibrary.Algorithms/analyticsLibrary.Algorithms.csproj
            src/analyticsLibrary.Statistics/analyticsLibrary.Statistics.csproj
            src/analyticsLibrary.Excel/analyticsLibrary.Excel.csproj
            src/analyticsLibrary.Access/analyticsLibrary.Access.csproj
            src/analyticsLibrary.Hadoop/analyticsLibrary.Hadoop.csproj
            src/analyticsLibrary/analyticsLibrary.csproj
          )

          for csproj in "${PROJECTS[@]}"; do
            current=$(grep -oPm1 '<Version>\K[^<]+' "$csproj")
            if [ -z "$current" ]; then
              echo "ERROR: Could not read <Version> from $csproj"
              exit 1
            fi

            max_version=$(printf '%s\n%s\n' "$V" "$current" | sort -V | tail -n1)
            if [ "$max_version" != "$V" ]; then
              echo "ERROR: Requested release version $V is lower than project version $current in $csproj"
              exit 1
            fi
          done

      - name: Pack all packages
        run: |
          mkdir -p ./artifacts
          V="${{ steps.version.outputs.VERSION }}"
          dotnet pack src/analyticsLibrary.Core/analyticsLibrary.Core.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts
          dotnet pack src/analyticsLibrary.Algorithms/analyticsLibrary.Algorithms.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts
          dotnet pack src/analyticsLibrary.Statistics/analyticsLibrary.Statistics.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts
          dotnet pack src/analyticsLibrary.Excel/analyticsLibrary.Excel.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts
          dotnet pack src/analyticsLibrary.Access/analyticsLibrary.Access.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts
          dotnet pack src/analyticsLibrary.Hadoop/analyticsLibrary.Hadoop.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts
          dotnet pack src/analyticsLibrary/analyticsLibrary.csproj -c Release --no-build "-p:Version=$V" -o ./artifacts

      - name: Inspect packages
        run: |
          echo "Produced packages:"
          ls -la ./artifacts/*.nupkg
          for id in analyticsLibrary.Core analyticsLibrary.Algorithms analyticsLibrary.Statistics analyticsLibrary.Excel analyticsLibrary.Access analyticsLibrary.Hadoop; do
            if ! ls "./artifacts/${id}."*.nupkg 1>/dev/null 2>&1; then
              echo "ERROR: Expected package not found: ${id}"
              exit 1
            fi
          done
          if ! ls ./artifacts/analyticsLibrary.[0-9]*.nupkg 1>/dev/null 2>&1; then
            echo "ERROR: Expected root package not found: analyticsLibrary.<semver>.nupkg"
            exit 1
          fi
          echo "All ${{ steps.version.outputs.VERSION }} packages found and ready for deployment."

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/*.nupkg
          retention-days: 90

      - name: Deploy to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Deprecate prior versions on NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is not set; skipping deprecation."
            exit 0
          fi
          dotnet run -c Release --no-build --project tools/analyticsLibrary.NuGetMaintenance -- apply-deprecations "${{ steps.version.outputs.VERSION }}"
